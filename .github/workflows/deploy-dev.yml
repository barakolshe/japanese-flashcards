name: Deploy (dev)

# Post-merge: runs after a PR merges into dev. Builds the development environment.
# This is the slow path — a failure here is fixed forward on dev, not a blocked PR.
# Hosting (e.g. Vercel/Netlify) is handled by the host's own GitHub integration on
# push to dev; this job just verifies the dev build stays green.
on:
  push:
    branches: [dev]

defaults:
  run:
    working-directory: web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
